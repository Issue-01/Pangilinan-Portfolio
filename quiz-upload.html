<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Upload | Academic Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="app.js"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Portfolio</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li class="dropdown">
                    <span class="nav-link dropdown-toggle active">Uploads</span>
                    <ul class="dropdown-menu">
                        <li><a href="quiz-upload.html" class="dropdown-item active">Quiz Upload</a></li>
                        <li><a href="lab-upload.html" class="dropdown-item">Lab Work Upload</a></li>
                        <li><a href="major-exam-upload.html" class="dropdown-item">Major Exam Upload</a></li>
                    </ul>
                </li>
            </ul>
            <div class="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="container" style="padding-top: 80px;">
        <div class="back-button-container">
            <a href="dashboard.html" class="back-btn"><span class="btn-icon">&#x2190;</span> Back to Dashboard</a>
        </div>
        <main class="grades-section">
            <div class="add-task-form">
                <h3>Upload Quiz</h3>
                <form action="#" method="post" enctype="multipart/form-data" data-type="quiz" onsubmit="window.handleFormSubmit(event); return false;">

                    <div class="input-group full-width">
                        <label for="quizTitle"><span class="label-dot"></span> Quiz Title</label>
                        <input type="text" id="quizTitle" name="quizTitle" placeholder="e.g., Mathematics Midterm Quiz #2" required>
                    </div>

                    <div class="input-group full-width">
                        <label for="quizFile"><span class="label-dot"></span> Quiz File (PDF/Image)</label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="quizFile" name="quizFile" accept=".pdf,image/*" class="file-input-visible">
                            <span class="file-name">No file chosen</span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="quizScore"><span class="label-dot"></span> Score Obtained</label>
                            <input type="number" id="quizScore" name="quizScore" placeholder="e.g., 85" min="0" required>
                        </div>
                        <div class="input-group">
                            <label for="quizMax"><span class="label-dot"></span> Maximum Score</label>
                            <input type="number" id="quizMax" name="quizMax" placeholder="e.g., 100" min="1" value="100">
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label for="proofImage"><span class="label-dot">*</span> Proof Image (Required)</label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="proofImage" name="proofImage" accept="image/*" class="file-input-visible" required>
                            <span class="file-name">No file chosen</span>
                        </div>
                        <small style="color: var(--text-muted);">Screenshot of submission confirmation or graded paper</small>
                    </div>

                    <button type="submit" class="add-btn">
                        <span class="btn-icon">&#x2713;</span> Submit Quiz Upload
                    </button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
